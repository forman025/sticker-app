<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mopar Build Lookup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #222;
  -webkit-text-size-adjust: 100%;
}

/* HEADER */
.topbar {
  width:100%;
  background:linear-gradient(90deg,#0a0a0a,#000,#0a0a0a);
  color:white;
  padding:16px 0;
  text-align:center;
  font-family: 'Oswald', sans-serif;
  letter-spacing:4px;
  margin-bottom: 10px;
}

/* CONTAINER (MATCHES WORKING APP BEHAVIOR) */
.container {
  max-width: 420px;
  width: 100%;
  padding: 24px;
  margin: 0 auto;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid #555;
  background: #111;
  color: white;
  font-size: 16px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 6px;
  border: none;
  font-size: 16px;
  background: #ff3c00;
  color: white;
  cursor: pointer;
}

/* MOBILE SCALE */
@media (max-width: 768px) {
  .container {
    padding: 24px;
  }

  input {
    font-size: 18px;
    padding: 16px;
  }

  button {
    font-size: 18px;
    padding: 16px;
  }
}
</style>
</head>

<body>

<div class="topbar">MOPAR BUILD LOOKUP</div>

<div class="container">
  <input id="vinInput" placeholder="ENTER VIN (17 CHARACTERS)" maxlength="17">
  <button onclick="lookupVIN()">Search</button>
</div>

<div id="result" style="max-width:900px;margin:20px auto;color:white;"></div>

<script>
async function lookupVIN() {
  const vin = document.getElementById("vinInput").value.trim();
  const result = document.getElementById("result");

  if (vin.length !== 17) {
    result.innerHTML = "Invalid VIN";
    return;
  }

  result.innerHTML = "Loading...";

  try {
    const res = await fetch(`https://mopar-vin-api.onrender.com/api/decode/${vin}`);
    const json = await res.json();
    const d = json.data;

    result.innerHTML = `<div style="background:white;color:black;padding:20px;">
      ${d.year} ${d.make} ${d.model} ${d.trim}
    </div>`;
  } catch {
    result.innerHTML = "Error loading VIN";
  }
}
</script>

</body>
</html>
