<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mopar Build Lookup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #222;
  -webkit-text-size-adjust: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  max-width: 420px;
  width: 100%;
  padding: 24px;
  text-align: center;
}

.title {
  color: white;
  font-size: 20px;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

input {
  width: 100%;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid #555;
  background: #111;
  color: white;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 16px;
  border-radius: 6px;
  border: none;
  font-size: 16px;
  background: #ff3c00;
  color: white;
  cursor: pointer;
}

@media (max-width: 768px) {
  input, button {
    font-size: 18px;
    padding: 18px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="title">MOPAR BUILD LOOKUP</div>
  <input id="vinInput" placeholder="ENTER VIN (17 CHARACTERS)" maxlength="17">
  <button onclick="lookupVIN()">Search</button>
</div>

<div id="result" style="max-width:900px;margin:20px auto;color:white;"></div>

<script>
async function lookupVIN() {
  const vin = document.getElementById("vinInput").value.trim();
  const result = document.getElementById("result");

  if (vin.length !== 17) {
    result.innerHTML = "Invalid VIN";
    return;
  }

  result.innerHTML = "Loading...";

  try {
    const res = await fetch(`https://mopar-vin-api.onrender.com/api/decode/${vin}`);
    const json = await res.json();
    const d = json.data;

    result.innerHTML = `<div style="background:white;color:black;padding:20px;">
      ${d.year} ${d.make} ${d.model} ${d.trim}
    </div>`;
  } catch {
    result.innerHTML = "Error loading VIN";
  }
}
</script>

</body>
</html>
