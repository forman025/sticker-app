<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIN Sticker</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* TOP BAR */
.topbar {
  width:100%;
  background:linear-gradient(90deg, #0a0a0a, #000, #0a0a0a);
  color:white;
  padding:16px 0;
  text-align:center;
  font-family:'Oswald', sans-serif;
  letter-spacing:4px;
  font-size:18px;
}

.topbar .mopar {
  color:#ff3c00;
  font-weight:600;
  text-shadow:0 0 6px rgba(255,60,0,0.6);
}

/* BODY */
body {
  background:#222;
  margin:0;
  font-family:Arial, sans-serif;
}

/* SEARCH */
.container {
  max-width:420px;
  margin:40px auto;
}

input {
  width:100%;
  padding:12px;
  font-size:14px;
  border:1px solid #aaa;
  background:#111;
  color:white;
  border-radius:3px;
  margin-bottom:10px;
  box-sizing:border-box;
}

input:focus {
  outline:none;
  border-color:#ff3c00;
}

button {
  width:100%;
  padding:12px;
  font-size:14px;
  background:#ff3c00;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover {
  background:#ff5a1f;
}

/* RESULT */
.result-container {
  max-width:950px;
  margin:20px auto;
}

/* LOADER */
.loader {
  border:4px solid #eee;
  border-top:4px solid #ff3c00;
  border-radius:50%;
  width:30px;
  height:30px;
  animation:spin 1s linear infinite;
  margin:20px auto;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

/* STICKER */
.sticker {
  background:white;
  padding:20px;
  color:black;
}

/* HEADER */
.header {
  border-bottom:2px solid black;
  padding-bottom:10px;
  margin-bottom:10px;
}

.year {
  float:left;
  font-family:'Oswald', sans-serif;
  font-size:28px;
  margin-right:10px;
}

.brand {
  font-family:'Oswald', sans-serif;
  font-size:34px;
  font-weight:600;
  letter-spacing:3px;
}

.model {
  font-family:'Oswald', sans-serif;
  font-size:20px;
  font-style:italic;
}

/* BASE */
.base-box {
  border:2px solid black;
  display:inline-block;
  padding:6px 12px;
  margin-top:10px;
  font-weight:bold;
}

/* COLUMNS */
.columns {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.left {
  width:60%;
  font-size:12px;
}

.right {
  width:40%;
  font-size:12px;
  border-left:2px solid black;
  padding-left:10px;
}

/* SECTION */
.section-title {
  font-family:'Oswald', sans-serif;
  font-weight:600;
  margin-top:12px;
  border-bottom:1px solid black;
  padding-bottom:2px;
  text-transform:uppercase;
}

/* FEATURE SPLIT */
.feature-columns {
  display:flex;
  gap:20px;
}

.feature-columns div {
  width:50%;
}

/* OPTIONS */
.option-row {
  display:flex;
  justify-content:space-between;
}

/* TOTAL */
.total-box {
  border:3px solid black;
  padding:10px;
  text-align:center;
  font-family:'Oswald', sans-serif;
  font-size:18px;
  margin-top:10px;
}

/* WARRANTY */
.big-warranty {
  font-family:'Oswald', sans-serif;
  font-size:22px;
  font-weight:600;
}

/* DOWNLOAD LINK */
.download-link {
  margin-top:15px;
  font-size:13px;
  color:#ff3c00;
  cursor:pointer;
  text-align:center;
}

.download-link:hover {
  text-decoration:underline;
}

</style>
</head>

<body>

<div class="topbar">
  <span class="mopar">MOPAR</span> BUILD LOOKUP
</div>

<div class="container">
  <input id="vinInput" placeholder="ENTER VIN (17 CHARACTERS)" maxlength="17">
  <button onclick="lookupVIN()">Search</button>
</div>

<div id="result" class="result-container"></div>

<script>

// FORMAT PRICE
function formatPrice(num) {
  return `$${Number(num).toLocaleString()}`;
}

// CLEAN STANDARD FEATURES
function getCleanStandardFeatures(d) {
  const safeKeywords = [
    "Apple CarPlay",
    "Android Auto",
    "Bluetooth",
    "Touch Screen",
    "Backup Camera",
    "Brake Assist",
    "Keyless",
    "Remote",
    "Voice",
    "Steering Wheel",
    "WiFi"
  ];

  let features = [];

  if (d.high_value_features?.STANDARD) {
    features = d.high_value_features.STANDARD
      .map(f => f.description)
      .filter(desc =>
        safeKeywords.some(k => desc.toLowerCase().includes(k.toLowerCase()))
      );
  }

  return [...new Set(features)];
}

async function lookupVIN() {
  const vin = document.getElementById("vinInput").value.trim();
  const result = document.getElementById("result");

  if (vin.length !== 17) {
    result.innerHTML = "Invalid VIN";
    return;
  }

  result.innerHTML = `<div class="loader"></div>`;

  const res = await fetch(`https://mopar-vin-api.onrender.com/api/decode/${vin}`);
  const json = await res.json();
  const d = json.data;

  const exterior = d.exterior_color?.name || "";
  const interior = (d.interior_color?.name || "").replace("Perfromance", "Performance");

  // STANDARD FEATURES
  const standardFeatures = getCleanStandardFeatures(d);
  const featuresHTML = standardFeatures.length
    ? standardFeatures.map(f => `• ${f}`).join("<br>")
    : "Standard features not available";

  // OPTIONS
  let optionsArr = (d.installed_options_details || []).map(o => ({
    code: o.code,
    name: o.name.trim(),
    price: Number(o.msrp)
  }));

  // FIX PAINT NAME
  optionsArr = optionsArr.map(opt => {
    if (opt.code === "PP2" && d.exterior_color?.name) {
      return { ...opt, name: d.exterior_color.name };
    }
    return opt;
  });

  // REMOVE DUPES
  const seen = new Set();
  optionsArr = optionsArr.filter(opt => {
    if (seen.has(opt.code)) return false;
    seen.add(opt.code);
    return true;
  });

  // SORT
  optionsArr.sort((a, b) => b.price - a.price);

  let optionsHTML = "";
  optionsArr.forEach(opt => {
    optionsHTML += `
      <div class="option-row">
        <span>${opt.name}</span>
        <span>${formatPrice(opt.price)}</span>
      </div>
    `;
  });

  result.innerHTML = `
    <div id="stickerContent" class="sticker">

      <div class="header">
        <div class="year">${d.year}</div>
        <div class="brand">${d.make.toUpperCase()}</div>
        <div class="model">${d.model} ${d.trim}</div>

        <div class="base-box">
          Base Price: ${formatPrice(d.msrp)}
        </div>
      </div>

      <div class="columns">

        <div class="left">
          <div class="section-title">Vehicle Info</div>
          Engine: ${d.engine}<br>
          Transmission: ${d.transmission}<br>
          Drivetrain: ${d.drivetrain}<br>
          Exterior: ${exterior}<br>
          Interior: ${interior}

          <div class="section-title">Standard Equipment</div>
          <div style="font-size:11px;">
            ${featuresHTML}
          </div>
        </div>

        <div class="right">
          <div class="section-title">Optional Equipment</div>
          ${optionsHTML}

          <br>
          Destination Charge: ${formatPrice(d.delivery_charges)}

          <div class="total-box">
            TOTAL PRICE: ${formatPrice(d.combined_msrp)}
          </div>

          <div class="big-warranty">
            5 YEAR / 60,000 MILE
          </div>
        </div>

      </div>
    </div>

    <div class="download-link" onclick="downloadPDF()">
      Download Sticker as PDF
    </div>
  `;
}

</script>

</body>
</html>
