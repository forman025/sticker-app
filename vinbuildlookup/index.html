<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIN Sticker</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* TOP BAR */
.topbar {
  width:100%;
  background:linear-gradient(90deg,#0a0a0a,#000,#0a0a0a);
  color:white;
  padding:16px 0;
  text-align:center;
  font-family:'Oswald';
  letter-spacing:4px;
  font-size:18px;
}

/* BODY */
body {
  background:#222;
  margin:0;
  font-family:Arial;
  -webkit-text-size-adjust:100%;
}

/* SEARCH CONTAINER */
.container {
  width:100%;
  max-width:480px;
  margin:40px auto;
  padding:0 20px;
  box-sizing:border-box;
}

/* INPUT */
input {
  width:100%;
  padding:16px;
  font-size:16px;
  border:1px solid #777;
  background:#111;
  color:white;
  border-radius:4px;
  margin-bottom:12px;
  box-sizing:border-box;
}

/* BUTTON */
button {
  width:100%;
  padding:16px;
  font-size:16px;
  background:#ff3c00;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

/* RESULT */
.result-container {
  max-width:950px;
  margin:20px auto;
}

/* STICKER */
.sticker {
  background:white;
  padding:20px;
  color:black;
}

/* MOBILE FIX */
@media (max-width:768px) {

  .container {
    max-width:100%;
    padding:0 24px;
  }

  input {
    font-size:18px;
    padding:18px;
  }

  button {
    font-size:18px;
    padding:18px;
  }

}

</style>
</head>

<body>

<div class="topbar">MOPAR BUILD LOOKUP</div>

<div class="container">
  <input id="vinInput" placeholder="ENTER VIN (17 CHARACTERS)" maxlength="17">
  <button onclick="lookupVIN()">Search</button>
</div>

<div id="result" class="result-container"></div>

<script>

async function lookupVIN() {
  const vin = document.getElementById("vinInput").value.trim();
  const result = document.getElementById("result");

  if (vin.length !== 17) {
    result.innerHTML = "Invalid VIN";
    return;
  }

  result.innerHTML = "Loading...";

  const res = await fetch(`https://mopar-vin-api.onrender.com/api/decode/${vin}`);
  const json = await res.json();
  const d = json.data;

  result.innerHTML = `<div class="sticker">${d.year} ${d.make} ${d.model}</div>`;
}

</script>

</body>
</html>
