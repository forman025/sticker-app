<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIN Sticker</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* TOP BAR */
.topbar {
  width:100%;
  background:linear-gradient(90deg,#0a0a0a,#000,#0a0a0a);
  color:white;
  padding:16px 0;
  text-align:center;
  font-family:'Oswald', sans-serif;
  letter-spacing:4px;
}

.topbar .mopar {
  color:#ff3c00;
  text-shadow:0 0 6px rgba(255,60,0,0.6);
}

/* BODY */
body {
  background:#222;
  margin:0;
  font-family:Arial;
}

/* SEARCH */
.container {
  max-width:420px;
  margin:40px auto;
}

input, button {
  width:100%;
  padding:12px;
  font-size:14px;
  margin-bottom:10px;
  box-sizing:border-box;
}

input {
  background:#111;
  color:white;
  border:1px solid #aaa;
}

button {
  background:#ff3c00;
  color:white;
  border:none;
}

/* RESULT */
.result-container {
  max-width:950px;
  margin:20px auto;
}

/* LOADER */
.loader {
  border:4px solid #eee;
  border-top:4px solid #ff3c00;
  border-radius:50%;
  width:30px;
  height:30px;
  animation:spin 1s linear infinite;
  margin:20px auto;
}

@keyframes spin {100%{transform:rotate(360deg)}}

/* STICKER */
.sticker {
  background:white;
  padding:20px;
}

/* HEADER */
.header {
  border-bottom:2px solid black;
  margin-bottom:10px;
}

.year {
  float:left;
  font-family:'Oswald';
  font-size:28px;
  margin-right:10px;
}

.brand {
  font-family:'Oswald';
  font-size:34px;
  letter-spacing:3px;
  text-transform:uppercase;
}

.model {
  font-family:'Oswald';
  font-size:20px;
  font-style:italic;
}

/* BASE */
.base-box {
  border:2px solid black;
  display:inline-block;
  padding:6px 12px;
  margin-top:10px;
}

/* COLUMNS */
.columns {
  display:flex;
  gap:10px;
}

.left {width:60%;}
.right {
  width:40%;
  border-left:2px solid black;
  padding-left:10px;
}

/* SECTION */
.section-title {
  font-family:'Oswald';
  margin-top:10px;
  border-bottom:1px solid black;
  text-transform:uppercase;
}

/* FEATURES */
.feature-columns {
  display:flex;
  gap:20px;
}

.feature-columns div {
  width:50%;
  line-height:1.4;
}

/* OPTIONS */
.option-row {
  display:flex;
  justify-content:space-between;
}

/* TOTAL */
.total-box {
  border:3px solid black;
  padding:10px;
  text-align:center;
  font-family:'Oswald';
  margin-top:10px;
}

/* WARRANTY */
.big-warranty {
  font-family:'Oswald';
  font-size:22px;
}

/* DOWNLOAD */
.download-link {
  margin-top:15px;
  text-align:center;
  color:#ff3c00;
  cursor:pointer;
}

/* MOBILE FIX */
@media (max-width:600px){

  .columns {
    flex-direction:column;
  }

  .left,.right {
    width:100%;
    border:none;
    padding-left:0;
  }

  .feature-columns {
    flex-direction:column;
  }

}

</style>
</head>

<body>

<div class="topbar">
  <span class="mopar">MOPAR</span> BUILD LOOKUP
</div>

<div class="container">
  <input id="vinInput" placeholder="ENTER VIN (17 CHARACTERS)" maxlength="17">
  <button onclick="lookupVIN()">Search</button>
</div>

<div id="result" class="result-container"></div>

<script>

async function lookupVIN(){

  const vin = document.getElementById("vinInput").value.trim();
  const result = document.getElementById("result");

  if(vin.length !== 17){
    result.innerHTML = "Invalid VIN";
    return;
  }

  result.innerHTML = `
    <div class="loader"></div>
    <div style="text-align:center;font-size:12px;color:#aaa;">
      Loading vehicle data...
    </div>
  `;

  try {

    const res = await fetch(`https://mopar-vin-api.onrender.com/api/decode/${vin}`);
    const json = await res.json();

    if(!json || !json.data){
      result.innerHTML = "No data found";
      return;
    }

    const d = json.data;

    const exterior = typeof d.exterior_color === "object" ? d.exterior_color?.name : d.exterior_color;
    const interior = typeof d.interior_color === "object" ? d.interior_color?.name : d.interior_color;

    let features = [];

    if(d.high_value_features){
      features = Object.values(d.high_value_features)
        .flat()
        .map(f => f.description);
    }

    const half = Math.ceil(features.length / 2);
    const col1 = features.slice(0, half);
    const col2 = features.slice(half);

    const featuresHTML = `
      <div class="feature-columns">
        <div>${col1.map(f => `• ${f}`).join("<br>")}</div>
        <div>${col2.map(f => `• ${f}`).join("<br>")}</div>
      </div>
    `;

    let options = "";
    if(d.installed_options_details){
      d.installed_options_details.forEach(o=>{
        options += `
          <div class="option-row">
            <span>${o.name}</span>
            <span>$${o.msrp}</span>
          </div>
        `;
      });
    }

    result.innerHTML = `
      <div id="stickerContent" class="sticker">

        <div class="header">
          <div class="year">${d.year}</div>
          <div class="brand">${d.make.toUpperCase()}</div>
          <div class="model">${d.model} ${d.trim || ""}</div>

          <div class="base-box">
            Base Price: $${d.msrp}
          </div>
        </div>

        <div class="columns">

          <div class="left">
            <div class="section-title">Standard Equipment</div>
            ${featuresHTML}
          </div>

          <div class="right">
            <div class="section-title">Optional Equipment</div>
            ${options}

            <br>
            Destination Charge: $${d.delivery_charges}

            <div class="total-box">
              TOTAL PRICE: $${d.combined_msrp || d.total_msrp}
            </div>

            <div class="big-warranty">
              5 YEAR / 60,000 MILE
            </div>
          </div>

        </div>
      </div>

      <div class="download-link" onclick="downloadPDF()">
        Download Sticker as PDF
      </div>
    `;

  } catch(err){
    console.error(err);
    result.innerHTML = "Server error — try again";
  }
}

function downloadPDF(){
  const element = document.getElementById("stickerContent");
  html2pdf().from(element).save();
}

</script>

</body>
</html>
