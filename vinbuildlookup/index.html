<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIN Sticker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  background:#222;
  margin:0;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* 🔥 LOGO FIX (clean, not cheesy) */
.topbar {
  position:absolute;
  top:0;
  width:100%;
  text-align:center;
  padding:30px 0 10px;
  font-family:'Oswald';
  font-size:26px;
  letter-spacing:5px;
  color:#e5e5e5;
}

/* CENTER BOX */
.container {
  max-width:420px;
  width:100%;
  padding:24px;
}

/* INPUT */
input {
  width:100%;
  padding:16px;
  background:#111;
  color:white;
  margin-bottom:12px;
  border:1px solid #555;
  border-radius:10px;
  font-size:16px;
}

/* 🔥 BUTTON FIX (full width + proper size) */
button {
  width:100%;
  padding:16px;
  background:#ff3c00;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

/* MOBILE BEHAVIOR (same feel as your good version) */
@media (max-width:768px){
  body {
    align-items:flex-start;
    padding-top:80px;
  }

  input {
    font-size:18px;
  }

  button {
    font-size:18px;
  }
}
</style>
</head>

<body>

<div class="topbar">MOPAR BUILD LOOKUP</div>

<div class="container">
  <input id="vinInput" placeholder="ENTER VIN (17 CHARACTERS)" maxlength="17">
  <button onclick="lookupVIN()">Search</button>
</div>

<script>
async function lookupVIN() {
  const vin = document.getElementById("vinInput").value.trim();
  if (vin.length !== 17) {
    alert("Invalid VIN");
    return;
  }

  const res = await fetch(`https://mopar-vin-api.onrender.com/api/decode/${vin}`);
  const json = await res.json();
  console.log(json);
}
</script>

</body>
</html>
