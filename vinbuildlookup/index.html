<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mopar Build Lookup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #222;
}

/* 🔥 LOGO STYLE HEADER */
.topbar {
  text-align: center;
  padding: 40px 0 20px;
}

.logo-text {
  font-family: 'Oswald', sans-serif;
  font-size: 32px;
  letter-spacing: 6px;
  color: #e5e5e5;
}

/* CONTAINER */
.container {
  max-width: 420px;
  width: 100%;
  padding: 24px;
  margin: 0 auto;
}

/* INPUT */
input {
  width: 100%;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #555;
  background: #111;
  color: white;
  font-size: 16px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 16px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  background: #ff3c00;
  color: white;
}

/* MOBILE */
@media (max-width:768px){
  .logo-text {
    font-size: 26px;
    letter-spacing: 4px;
  }

  input {
    font-size: 18px;
  }

  button {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo-text">MOPAR BUILD LOOKUP</div>
</div>

<div class="container">
  <input id="vinInput" placeholder="ENTER VIN (17 CHARACTERS)" maxlength="17">
  <button onclick="lookupVIN()">Search</button>
</div>

<script>
async function lookupVIN() {
  const vin = document.getElementById("vinInput").value.trim();
  if (vin.length !== 17) return alert("Invalid VIN");

  const res = await fetch(`https://mopar-vin-api.onrender.com/api/decode/${vin}`);
  const json = await res.json();
  alert(json.data.year + " " + json.data.make);
}
</script>

</body>
</html>
