<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIN Sticker</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<style>

/* TOP BAR */
.topbar {
  width:100%;
  background:linear-gradient(90deg, #0a0a0a, #000, #0a0a0a);
  color:white;
  padding:16px 0;
  text-align:center;
  font-family:'Oswald', sans-serif;
  letter-spacing:4px;
  font-size:18px;
}

.topbar .mopar {
  color:#ff3c00;
  font-weight:600;
  text-shadow:0 0 6px rgba(255,60,0,0.6);
}

/* BODY */
body {
  background:#222;
  margin:0;
  font-family:Arial, sans-serif;
}

/* SEARCH */
.container {
  max-width:420px;
  margin:40px auto;
}

input {
  width:100%;
  padding:12px;
  font-size:14px;
  border:1px solid #aaa;
  background:#111;
  color:white;
  border-radius:3px;
  margin-bottom:10px;
  box-sizing:border-box;
}

input:focus {
  outline:none;
  border-color:#ff3c00;
}

button {
  width:100%;
  padding:12px;
  font-size:14px;
  background:#ff3c00;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover {
  background:#ff5a1f;
}

/* RESULT */
.result-container {
  max-width:950px;
  margin:20px auto;
}

/* LOADER */
.loader {
  border:4px solid #eee;
  border-top:4px solid #ff3c00;
  border-radius:50%;
  width:30px;
  height:30px;
  animation:spin 1s linear infinite;
  margin:20px auto;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

/* STICKER */
.sticker {
  background:white;
  padding:20px;
  color:black;
}

/* HEADER */
.header {
  border-bottom:2px solid black;
  padding-bottom:10px;
  margin-bottom:10px;
}

.year {
  float:left;
  font-family:'Oswald', sans-serif;
  font-size:28px;
  margin-right:10px;
}

.brand {
  font-family:'Oswald', sans-serif;
  font-size:34px;
  font-weight:600;
  letter-spacing:3px;
}

.model {
  font-family:'Oswald', sans-serif;
  font-size:20px;
  font-style:italic;
}

/* BASE */
.base-box {
  border:2px solid black;
  display:inline-block;
  padding:6px 12px;
  margin-top:10px;
  font-weight:bold;
}

/* COLUMNS */
.columns {
  display:flex;
  gap:10px;
  margin-top:15px;
}

.left {
  width:60%;
  font-size:12px;
}

.right {
  width:40%;
  font-size:12px;
  border-left:2px solid black;
  padding-left:10px;
}

/* SECTION */
.section-title {
  font-family:'Oswald', sans-serif;
  font-weight:600;
  margin-top:12px;
  border-bottom:1px solid black;
  padding-bottom:2px;
  text-transform:uppercase;
}

/* FEATURE SPLIT */
.feature-columns {
  display:flex;
  gap:20px;
}

.feature-columns div {
  width:50%;
}

/* OPTIONS */
.option-row {
  display:flex;
  justify-content:space-between;
}

/* TOTAL */
.total-box {
  border:3px solid black;
  padding:10px;
  text-align:center;
  font-family:'Oswald', sans-serif;
  font-size:18px;
  margin-top:10px;
}

/* WARRANTY */
.big-warranty {
  font-family:'Oswald', sans-serif;
  font-size:22px;
  font-weight:600;
}

/* DOWNLOAD LINK */
.download-link {
  margin-top:15px;
  font-size:13px;
  color:#ff3c00;
  cursor:pointer;
  text-align:center;
}

.download-link:hover {
  text-decoration:underline;
}

/* 🔥 MOBILE FIX */
@media (max-width: 600px) {

  .container {
    max-width: 90%;
    margin: 30px auto;
  }

  input {
    width: 100%;
    padding: 16px;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 16px;
    font-size: 16px;
  }

  .topbar {
    font-size: 16px;
    letter-spacing: 2px;
  }

  /* 🔥 make sticker fit screen */
  .result-container {
    max-width: 100%;
    padding: 0 10px;
  }

  .sticker {
    padding: 12px;
  }

  /* 🔥 stack columns on mobile */
  .columns {
    flex-direction: column;
  }

  .left,
  .right {
    width: 100%;
    border-left: none;
    padding-left: 0;
  }

  /* 🔥 feature columns go single column */
  .feature-columns {
    flex-direction: column;
  }

  .feature-columns div {
    width: 100%;
  }

}

</style>
</head>

<body>

<div class="topbar">
  <span class="mopar">MOPAR</span> BUILD LOOKUP
</div>

<div class="container">
  <input id="vinInput" placeholder="ENTER VIN (17 CHARACTERS)" maxlength="17">
  <button onclick="lookupVIN()">Search</button>
</div>

<div id="result" class="result-container"></div>

<script>
async function lookupVIN() {
  const vin = document.getElementById("vinInput").value.trim();
  const result = document.getElementById("result");

  if (vin.length !== 17) {
    result.innerHTML = "Invalid VIN";
    return;
  }

  // 🔥 LOADER
  result.innerHTML = `<div class="loader"></div>`;

  const res = await fetch(`fetch(`fetch(`https://mopar-backend.onrender.com/api/decode/${vin}`));
  const json = await res.json();

  if (!json.data) {
    result.innerHTML = "No data found";
    return;
  }

  const d = json.data;

  const exterior = typeof d.exterior_color === "object"
    ? d.exterior_color?.name
    : d.exterior_color;

  const interior = typeof d.interior_color === "object"
    ? d.interior_color?.name
    : d.interior_color;

  let trim = d.trim || "";
  let version = d.version || "";

  if (version.toUpperCase().includes(trim.toUpperCase())) trim = "";

  let title = `${d.model.toUpperCase()} ${trim} ${version}`.trim();

  let features = [];
  if (d.high_value_features) {
    features = Object.values(d.high_value_features)
      .flat()
      .map(f => f.description);
  }

  const half = Math.ceil(features.length / 2);
  const col1 = features.slice(0, half);
  const col2 = features.slice(half);

  const featuresHTML = `
    <div class="feature-columns">
      <div>${col1.map(f => `• ${f}`).join("<br>")}</div>
      <div>${col2.map(f => `• ${f}`).join("<br>")}</div>
    </div>
  `;

  let options = "";
  if (d.installed_options_details) {
    d.installed_options_details.forEach(o => {
      options += `
        <div class="option-row">
          <span>${o.name}</span>
          <span>$${o.msrp}</span>
        </div>
      `;
    });
  }

  result.innerHTML = `
    <div id="stickerContent" class="sticker">

      <div class="header">
        <div class="year">${d.year}</div>
        <div class="brand">${d.make.toUpperCase()}</div>
        <div class="model">${title}</div>

        <div class="base-box">
          Base Price: $${d.msrp}
        </div>
      </div>

      <div class="columns">

        <div class="left">
          <div class="section-title">Vehicle Info</div>
          Engine: ${d.engine}<br>
          Transmission: ${d.transmission}<br>
          Drivetrain: ${d.drivetrain}<br>
          Exterior: ${exterior}<br>
          Interior: ${interior}

          <div class="section-title">Standard Equipment</div>
          ${featuresHTML}
        </div>

        <div class="right">
          <div class="section-title">Optional Equipment</div>
          ${options}

          <br>
          Destination Charge: $${d.delivery_charges}

          <div class="total-box">
            TOTAL PRICE: $${d.combined_msrp || d.total_msrp}
          </div>

          <div class="big-warranty">
            5 YEAR / 60,000 MILE
          </div>
        </div>

    </div>  <!-- right column -->
</div>  <!-- columns -->

</div>  <!-- 🔥 THIS CLOSES #stickerContent -->

<!-- ✅ NOW OUTSIDE -->
<div class="download-link" onclick="downloadPDF()">
  Download Sticker as PDF
</div>
`;
}

/* PDF */
function downloadPDF() {
  const element = document.getElementById("stickerContent");

  const link = document.querySelector(".download-link");
  if (link) link.style.visibility = "hidden";

  const opt = {
    margin: 0,
    filename: 'mopar-sticker.pdf',

    image: { type: 'jpeg', quality: 1 },

    html2canvas: {
      scale: 4,              // 🔥 BIG upgrade (was 2)
      useCORS: true,
      letterRendering: true
    },

    jsPDF: {
      unit: 'mm',
      format: 'a4',
      orientation: 'portrait'
    }
  };

  html2pdf().set(opt).from(element).save().then(() => {
    if (link) link.style.visibility = "visible";
  });
}
</script>

</body>
</html>
