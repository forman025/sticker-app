<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIN Sticker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

/* GLOBAL FIX */
* { box-sizing: border-box; }

/* BODY (FIXED MOBILE BEHAVIOR) */
body {
  background:#222;
  margin:0;
  font-family:Arial, sans-serif;
  -webkit-text-size-adjust:100%;

  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* TOP BAR */
.topbar {
  position:absolute;
  top:0;
  width:100%;
  background:linear-gradient(90deg,#0a0a0a,#000,#0a0a0a);
  color:white;
  padding:16px 0;
  text-align:center;
  font-family:'Oswald', sans-serif;
  letter-spacing:4px;
  font-size:18px;
}

/* CONTAINER (FIXED) */
.container {
  width:100%;
  max-width:420px;
  padding:24px;
  margin-top:80px;
}

/* INPUT + BUTTON MATCH */
input, button {
  width:100%;
}

/* INPUT */
input {
  padding:14px;
  font-size:16px;
  border:1px solid #aaa;
  background:#111;
  color:white;
  border-radius:3px;
  margin-bottom:10px;
}

/* BUTTON */
button {
  padding:14px;
  font-size:16px;
  background:#ff3c00;
  color:white;
  border:none;
  cursor:pointer;
}

/* RESULT */
.result-container {
  max-width:950px;
  margin:20px auto;
  width:100%;
}

/* STICKER */
.sticker {
  background:white;
  padding:20px;
  color:black;
}

/* HEADER */
.header {
  border-bottom:2px solid black;
  padding-bottom:10px;
  margin-bottom:10px;
}

.year { float:left; font-family:'Oswald'; font-size:28px; margin-right:10px; }
.brand { font-family:'Oswald'; font-size:34px; font-weight:600; }
.model { font-family:'Oswald'; font-size:20px; font-style:italic; }

.base-box {
  border:2px solid black;
  display:inline-block;
  padding:6px 12px;
  margin-top:10px;
}

/* COLUMNS */
.columns { display:flex; gap:10px; margin-top:15px; }

.left { width:60%; font-size:12px; }
.right { width:40%; font-size:12px; border-left:2px solid black; padding-left:10px; }

.section-title {
  font-family:'Oswald';
  font-weight:600;
  margin-top:12px;
  border-bottom:1px solid black;
}

/* OPTIONS */
.option-row { display:flex; justify-content:space-between; }

.option-row span:last-child {
  min-width:80px;
  text-align:right;
}

/* TOTAL */
.total-box {
  border:3px solid black;
  padding:10px;
  text-align:center;
  font-family:'Oswald';
  font-size:18px;
  margin-top:10px;
}

.big-warranty { font-family:'Oswald'; font-size:22px; }

/* MOBILE */
@media(max-width:768px){

  body {
    align-items:flex-start;
  }

  .container {
    margin-top:70px;
    padding:20px;
  }

  input, button {
    font-size:18px;
    padding:16px;
  }

  .columns {
    flex-direction:column;
  }

  .left, .right {
    width:100%;
    border-left:none;
    padding-left:0;
    font-size:14px;
  }

  .year { float:none; font-size:22px; }
  .brand { font-size:26px; }
  .model { font-size:16px; }

}

</style>
</head>

<body>

<div class="topbar">MOPAR BUILD LOOKUP</div>

<div class="container">
  <input id="vinInput" placeholder="ENTER VIN (17 CHARACTERS)" maxlength="17">
  <button onclick="lookupVIN()">Search</button>
</div>

<div id="result" class="result-container"></div>

<script>

function formatPrice(num){
  return `$${Number(num).toLocaleString()}`;
}

async function lookupVIN(){
  const vin=document.getElementById("vinInput").value.trim();
  const result=document.getElementById("result");

  if(vin.length!==17){
    result.innerHTML="Invalid VIN";
    return;
  }

  result.innerHTML="Loading...";

  const res=await fetch(`https://mopar-vin-api.onrender.com/api/decode/${vin}`);
  const json=await res.json();
  const d=json.data;

  result.innerHTML=`
  <div class="sticker">
    <div class="header">
      <div class="year">${d.year}</div>
      <div class="brand">${d.make}</div>
      <div class="model">${d.model} ${d.trim}</div>
    </div>
    Engine: ${d.engine}<br>
    Transmission: ${d.transmission}<br>
  </div>
  `;
}

</script>

</body>
</html>
