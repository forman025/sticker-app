<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Mopar Window Sticker Lookup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f7fa;
}

.app {
  max-width: 500px;
  margin: 60px auto;
  background: white;
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

.logo { text-align: center; }
.logo img { max-width: 180px; }

h1 {
  text-align: center;
  font-size: 22px;
  margin: 10px 0;
}

.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 20px;
}

/* Floating input */
.input-group {
  position: relative;
  margin-bottom: 12px;
}

.input-group input {
  width: 100%;
  padding: 16px 14px;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #fafafa;
  font-size: 16px;
}

.input-group label {
  position: absolute;
  left: 12px;
  top: 14px;
  color: #888;
  font-size: 14px;
  background: white;
  padding: 0 5px;
  transition: 0.2s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
  top: -8px;
  font-size: 12px;
  color: #2d7ef7;
}

.input-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.small-btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #eef2f7;
  cursor: pointer;
}

.main-btn {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #2d7ef7;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result { margin-top: 20px; }

.open-btn {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #eef2f7;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.loading {
  text-align: center;
}

.spinner {
  width: 30px;
  height: 30px;
  border: 3px solid #ddd;
  border-top: 3px solid #2d7ef7;
  border-radius: 50%;
  margin: 10px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.info {
  margin-top: 15px;
  background: #f1f4f8;
  padding: 12px;
  border-radius: 8px;
}

/* Scanner box */
#reader {
  margin-top: 15px;
  border-radius: 12px;
  overflow: hidden;
}
</style>
</head>

<body>

<div class="app">

  <div class="logo">
    <img src="logo.png">
  </div>

  <h1>Mopar Window Sticker Lookup</h1>
  <div class="subtitle">Dodge • Jeep • RAM • Chrysler</div>

  <div class="input-group">
    <input id="vin" placeholder=" " maxlength="17">
    <label>Enter VIN</label>
  </div>

  <div class="input-actions">
    <button class="small-btn" onclick="pasteVIN()">Paste</button>
    <button class="small-btn" onclick="scanVIN()">Scan</button>
  </div>

  <button class="main-btn" onclick="prepare()">Find Window Sticker</button>

  <div id="reader" style="display:none;"></div>

  <button onclick="stopScanner()" class="small-btn" style="margin-top:10px;">
    Stop Camera
  </button>

  <div id="result" class="result"></div>
  <div id="info" class="info" style="display:none;"></div>

</div>

<!-- Scanner library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let stickerUrl = null;
let scanner;

const endpoint = "https://www.dodge.com/hostd/windowsticker/getWindowStickerPdf.do?vin=";

// VIN formatting
document.getElementById("vin").addEventListener("input", e => {
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
});

// Paste VIN
async function pasteVIN() {
  const text = await navigator.clipboard.readText();
  document.getElementById("vin").value = text.toUpperCase();
}

// Start scanner
function scanVIN() {
  const reader = document.getElementById("reader");
  reader.style.display = "block";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      document.getElementById("vin").value = decodedText.toUpperCase();
      stopScanner();
    },
    () => {}
  );
}

// Stop scanner
function stopScanner() {
  if (scanner) {
    scanner.stop().then(() => {
      document.getElementById("reader").style.display = "none";
    });
  }
}

// VIN decode
function decodeVIN(vin) {
  const yearCodes = {
    A:2010,B:2011,C:2012,D:2013,E:2014,F:2015,
    G:2016,H:2017,J:2018,K:2019,L:2020,M:2021,
    N:2022,P:2023,R:2024,S:2025,T:2026
  };

  return {
    year: yearCodes[vin[9]] || "Unknown",
    plant: vin[10],
    serial: vin.slice(11)
  };
}

// Main action
function prepare() {
  const vin = document.getElementById("vin").value.trim();
  const result = document.getElementById("result");
  const info = document.getElementById("info");

  result.innerHTML = "";
  info.style.display = "none";

  if (vin.length !== 17) {
    result.innerHTML = "<div style='color:red'>Invalid VIN</div>";
    return;
  }

  result.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      Loading...
    </div>
  `;

  stickerUrl = endpoint + vin;
  const decoded = decodeVIN(vin);

  setTimeout(() => {
    result.innerHTML = `
      <button class="open-btn" onclick="openSticker()">Open Window Sticker</button>
      <button class="open-btn" onclick="downloadSticker()">Download PDF</button>
    `;

    info.style.display = "block";
    info.innerHTML = `
      <strong>VIN Info</strong><br>
      Year: ${decoded.year}<br>
      Plant: ${decoded.plant}<br>
      Serial: ${decoded.serial}
    `;
  }, 500);
}

function openSticker() {
  window.open(stickerUrl, "_blank");
}

function downloadSticker() {
  const a = document.createElement("a");
  a.href = stickerUrl;
  a.download = "sticker.pdf";
  a.click();
}
</script>

</body>
</html>
