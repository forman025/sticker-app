<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mopar Sticker Lookup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(to bottom, #eef2f7, #dfe5ee);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 24px;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  text-align: center;
}

.logo {
  width: 44px;
  height: 44px;
  margin: 0 auto 10px;
  border-radius: 10px;
  background: linear-gradient(135deg, #ff6a00, #ff9f1c);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
}

h1 {
  margin: 6px 0;
  font-size: 20px;
}

.subtitle {
  color: #6b7280;
  font-size: 14px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
  text-transform: uppercase;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.search-btn {
  background: linear-gradient(to right, #ff4d4d, #ff9f1c);
  color: white;
  margin-bottom: 10px;
}

.open-btn {
  background: #22c55e;
  color: white;
  margin-top: 10px;
}

.status {
  margin-top: 10px;
  font-size: 14px;
}

.success { color: #16a34a; }
.error { color: #dc2626; }

.footer {
  text-align: center;
  margin-top: 14px;
  font-size: 12px;
  color: #9ca3af;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo">M</div>

    <h1>Mopar Sticker Lookup</h1>
    <div class="subtitle">Find your original Mopar window sticker instantly</div>

    <input id="vinInput" maxlength="17" placeholder="Enter VIN (17 characters)" />

    <button id="searchBtn" class="search-btn" onclick="searchVIN()">
      Search
    </button>

    <div id="status" class="status"></div>

    <button id="openBtn" class="open-btn" style="display:none;" onclick="openSticker()">
      Open Sticker
    </button>

  </div>

  <div class="footer">
    Fast · Free · Built for Mopar owners<br/>
    Not affiliated with Dodge, Chrysler, Jeep, or Ram
  </div>
</div>

<script>
const API = "https://mopar-backend.onrender.com";
let currentURL = null;
let isCached = false;

function isIPhone() {
  return /iPhone|iPad|iPod/i.test(navigator.userAgent);
}

async function searchVIN() {
  const vin = document.getElementById("vinInput").value.trim().toUpperCase();
  const status = document.getElementById("status");
  const btn = document.getElementById("searchBtn");
  const openBtn = document.getElementById("openBtn");

  if (vin.length !== 17) {
    status.innerHTML = "Enter a valid 17-character VIN";
    status.className = "status error";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Searching...";

  status.innerHTML = "Checking database...";
  status.className = "status";

  openBtn.style.display = "none";

  try {
    const res = await fetch(`${API}/sticker/${vin}`);
    const data = await res.json();

    if (data.success) {
      currentURL = data.url;
      isCached = data.cached || false;

      if (isCached) {
        status.innerHTML = "⚡ Loaded instantly from database";
      } else {
        status.innerHTML = "Sticker found & saved";
      }

      status.className = "status success";
      openBtn.style.display = "block";

    } else {
      status.innerHTML = "Sticker not found";
      status.className = "status error";
    }

  } catch {
    status.innerHTML = "Server error — try again";
    status.className = "status error";
  }

  btn.disabled = false;
  btn.innerText = "Search";
}

function openSticker() {
  if (!currentURL) return;

  if (isIPhone()) {
    // 🔥 Fix iPhone PDF issue
    const viewer = `https://docs.google.com/gview?embedded=1&url=${encodeURIComponent(currentURL)}`;
    window.location.href = viewer;
  } else {
    window.open(currentURL, "_blank");
  }
}
</script>

</body>
</html>
