<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Mopar Window Sticker Lookup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/favicon.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f7fa;
}

.app {
  max-width: 500px;
  margin: 60px auto;
  background: white;
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

.logo { text-align: center; }
.logo img { max-width: 180px; }

h1 { text-align: center; margin: 10px 0; }
.subtitle { text-align: center; color: #666; margin-bottom: 20px; }

.input-group {
  position: relative;
  margin-bottom: 12px;
}

.input-group input {
  width: 100%;
  padding: 16px 14px;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #fafafa;
  font-size: 16px;
}

.input-group label {
  position: absolute;
  left: 12px;
  top: 14px;
  color: #888;
  font-size: 14px;
  background: white;
  padding: 0 5px;
  transition: 0.2s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
  top: -8px;
  font-size: 12px;
  color: #2d7ef7;
}

.input-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.small-btn {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #eef2f7;
  cursor: pointer;
}

.main-btn {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: #2d7ef7;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result { margin-top: 20px; }

.open-btn {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #eef2f7;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.spinner {
  width: 30px;
  height: 30px;
  border: 3px solid #ddd;
  border-top: 3px solid #2d7ef7;
  border-radius: 50%;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Camera */
#camera {
  display: none;
  margin-top: 15px;
  text-align: center;
}

video {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="app">

  <div class="logo">
    <img src="logo.png">
  </div>

  <h1>Mopar Window Sticker Lookup</h1>
  <div class="subtitle">Dodge • Jeep • RAM • Chrysler</div>

  <div class="input-group">
    <input id="vin" placeholder=" " maxlength="17">
    <label>Enter VIN</label>
  </div>

  <div class="input-actions">
    <button class="small-btn" onclick="pasteVIN()">Paste</button>
    <button class="small-btn" onclick="startCamera()">Scan (Beta)</button>
  </div>

  <button class="main-btn" onclick="prepare()">Find Window Sticker</button>

  <div id="camera">
    <p style="color:#666; font-size:13px;">
      Align VIN in frame (dashboard near windshield)
    </p>
    <video id="video" autoplay></video>
    <button class="small-btn" onclick="capture()">Capture VIN</button>
    <button class="small-btn" onclick="stopCamera()">Close</button>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <div id="result" class="result"></div>

</div>

<script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
let stickerUrl = null;
let stream;

const endpoint = "https://www.dodge.com/hostd/windowsticker/getWindowStickerPdf.do?vin=";

// Format VIN
document.getElementById("vin").addEventListener("input", e => {
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
});

// Paste
async function pasteVIN() {
  const text = await navigator.clipboard.readText();
  document.getElementById("vin").value = text.toUpperCase();
}

// Camera
async function startCamera() {
  const video = document.getElementById("video");
  const cam = document.getElementById("camera");

  cam.style.display = "block";

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;
}

function stopCamera() {
  document.getElementById("camera").style.display = "none";
  if (stream) stream.getTracks().forEach(t => t.stop());
}

// OCR
function capture() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  stopCamera();

  document.getElementById("result").innerHTML = "Reading VIN...";

  Tesseract.recognize(canvas, 'eng', {
    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
  }).then(({ data: { text } }) => {

    let cleaned = text.toUpperCase()
      .replace(/O/g, "0")
      .replace(/I/g, "1")
      .replace(/Q/g, "0");

    const match = cleaned.match(/[A-HJ-NPR-Z0-9]{17}/);

    if (match) {
      document.getElementById("vin").value = match[0];
      prepare();
    } else {
      document.getElementById("result").innerHTML = "Couldn't detect VIN. Try again.";
    }
  });
}

// Main
function prepare() {
  const vin = document.getElementById("vin").value.trim();
  const result = document.getElementById("result");

  result.innerHTML = "";

  if (vin.length !== 17) {
    result.innerHTML = "<div style='color:red'>Invalid VIN</div>";
    return;
  }

  result.innerHTML = `<div class="spinner"></div>`;

  stickerUrl = endpoint + vin;

  setTimeout(() => {
    result.innerHTML = `
      <button class="open-btn" onclick="openSticker()">
        View Window Sticker
      </button>
    `;
  }, 400);
}

// Open sticker
function openSticker() {
  window.open(stickerUrl, "_blank");
}
</script>

</body>
</html>
